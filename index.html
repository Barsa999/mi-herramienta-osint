<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BARSA.NET - Seguridad de Datos</title>
    <style>
        body {
            background-color: #1e1e2f;
            color: #ffffff;
            font-family: 'Segoe UI', sans-serif;
            text-align: center;
            padding-top: 30px;
            margin: 0;
            position: relative;
            min-height: 100vh;
        }
        h1 { color: #4af626; margin-top: 25px; font-size: 28px; letter-spacing: 1px; }
        .subtitulo { color: #b3b3cc; font-size: 16px; margin-top: -10px; margin-bottom: 30px; }
        
        nav { margin-bottom: 40px; }
        nav a { color: #4af626; text-decoration: none; margin: 0 15px; font-size: 18px; font-weight: bold; }
        nav a:hover { text-decoration: underline; }
        
        #menu-proyectos { display: none; color: #4af626; }
        
        .mi-foto { width: 500px; max-width: 85%; height: auto; border-radius: 12px; border: 3px solid #4af626; box-shadow: 0 0 15px rgba(74, 246, 38, 0.3); }
        
        .tarjeta-soporte-flotante { position: absolute; top: 30px; right: 40px; background-color: #252538; border: 2px solid #4af626; border-radius: 10px; padding: 15px 20px; width: 250px; text-align: left; cursor: pointer; }
        .indicador-clic { font-size: 11px; color: #4af626; text-align: right; margin-top: 8px; display: block; font-style: italic; }

        .login-contenedor { background-color: #252538; border: 2px solid #3b3b54; border-radius: 12px; padding: 35px; width: 340px; margin: 40px auto; text-align: left; }
        .login-contenedor h2 { color: #4af626; font-size: 22px; text-align: center; margin-bottom: 25px; }
        .grupo-campo { margin-bottom: 20px; }
        .grupo-campo label { display: block; color: #4af626; font-size: 14px; margin-bottom: 8px; }
        .grupo-campo input { width: 100%; padding: 12px; background-color: #1a1a26; border: 1px solid #3b3b54; border-radius: 6px; color: #fff; box-sizing: border-box; }
        
        .btn-ingresar { width: 100%; background-color: #4af626; color: #1e1e2f; border: none; padding: 14px; font-weight: bold; border-radius: 6px; cursor: pointer; }

        .pantalla-oscura { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-color: rgba(0,0,0,0.75); justify-content: center; align-items: center; }
        .ventana-modal { background-color: #252538; border: 2px solid #4af626; border-radius: 12px; width: 400px; padding: 30px; position: relative; }
        .btn-cerrar { position: absolute; top: 15px; right: 15px; background: none; color: #fff; border: none; font-size: 20px; cursor: pointer; }
    </style>
</head>
<body>

    <div class="tarjeta-soporte-flotante" onclick="abrirModal()">
        <h3>Soporte Técnico</h3>
        <p>📞 Tlf: 080000200</p>
        <p>✉️ E-mail: soporte@barsa.net</p>
        <span class="indicador-clic">Click para reportar ↑</span>
    </div>

    <nav>
        <a href="index.html" style="color: white;">Inicio</a>
        <span id="menu-proyectos"> | <a href="proyectos.html">Mis Proyectos</a></span>
    </nav>

    <img src="Haking.jpeg" alt="Ciberseguridad" class="mi-foto">

    <h1>BASE DE DATOS BARSA.NET</h1>
    <p class="subtitulo">Encriptación de Datos y Ciberseguridad Ética</p>

    <div class="login-contenedor">
        <h2>Acceso al Portal ID</h2>
        <form onsubmit="validarAcceso(event)">
            <div class="grupo-campo">
                <label>Login:</label>
                <input type="text" id="usuario" placeholder="Ingresa tu usuario" required>
            </div>
            <div class="grupo-campo">
                <label>Password:</label>
                <input type="password" id="password" placeholder="••••••••" required>
            </div>
            <button type="submit" class="btn-ingresar">Iniciar Sesión</button>
        </form>
    </div>

    <div id="miModal" class="pantalla-oscura">
        <div class="ventana-modal">
            <button class="btn-cerrar" onclick="cerrarModal()">&times;</button>
            <h2 style="color: #4af626;">Ticket de Soporte</h2>
            <form onsubmit="enviarTicket(event)">
                <div class="grupo-campo"><label>Tu Correo:</label><input type="email" required></div>
                <div class="grupo-campo"><label>Asunto:</label><input type="text" required></div>
                <button type="submit" class="btn-ingresar">Enviar Reporte</button>
            </form>
        </div>
    </div>

    <script>
        function validarAcceso(event) {
            event.preventDefault();
            var userIn = document.getElementById('usuario').value;
            var passIn = document.getElementById('password').value;
            
            if (userIn === "RFLORESCA3" && passIn === "Rafael20072008") {
                localStorage.setItem("sesionActiva", "true");
                document.getElementById('menu-proyectos').style.display = 'inline';
                alert("Acceso concedido.");
                window.location.href = "proyectos.html";
            } else {
                alert("Acceso Denegado.");
            }
        }
        function abrirModal() { document.getElementById('miModal').style.display = 'flex'; }
        function cerrarModal() { document.getElementById('miModal').style.display = 'none'; }
        function enviarTicket(event) { event.preventDefault(); alert("Enviado."); cerrarModal(); }
    </script>
</body>
</html>
